services:
  pui-manager:
    build: .
    container_name: pui-manager
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/aplicaciones/pui:/home/aplicaciones/pui
      - ./data:/app/data
    env_file:
      - .env
